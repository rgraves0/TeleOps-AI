version: "3.9"

services:
  teleops-ai:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: teleops-ai

    restart: unless-stopped

    env_file:
      - .env

    volumes:
      - ./data:/app/data
      - ./data/logs:/app/data/logs
      - ./data/uploads:/app/data/uploads
      - ./data/cache:/app/data/cache
      - ./data/backups:/app/data/backups

    deploy:
      resources:
        limits:
          memory: 512M

    environment:
      TZ: Asia/Bangkok
      PYTHONUNBUFFERED: "1"

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sqlite3; sqlite3.connect('/app/data/teleops.db').execute('SELECT 1')"
        ]
      interval: 30s
      timeout: 10s
      retries: 3

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
